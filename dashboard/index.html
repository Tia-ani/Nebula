<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            padding: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #a78bfa;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
        }

        .stat-label {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #a78bfa;
        }

        .stat-value.green { color: #34d399; }
        .stat-value.yellow { color: #fbbf24; }
        .stat-value.blue { color: #60a5fa; }

        .section-title {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .job-list {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.85rem;
        }

        .job-item:last-child { border-bottom: none; }

        .job-id { color: #666; }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .badge.running {
            background: #1a1a00;
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .badge.complete {
            background: #001a0a;
            color: #34d399;
            border: 1px solid #34d399;
        }

        .worker-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .worker-badge {
            background: #111;
            border: 1px solid #34d399;
            color: #34d399;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .empty {
            color: #333;
            font-size: 0.85rem;
            text-align: center;
            padding: 20px;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #34d399;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <h1>⚡ Nebula</h1>
    <p class="subtitle">
        <span class="pulse"></span>
        Distributed Compute Network — Live
    </p>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Workers Online</div>
            <div class="stat-value green" id="worker-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Jobs Running</div>
            <div class="stat-value yellow" id="jobs-running">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Jobs Completed</div>
            <div class="stat-value" id="jobs-completed">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tasks Processed</div>
            <div class="stat-value blue" id="tasks-processed">0</div>
        </div>
    </div>

    <div class="section-title">Active Workers</div>
    <div class="job-list">
        <div class="worker-list" id="worker-list">
            <div class="empty">No workers connected</div>
        </div>
    </div>

    <div class="section-title">Jobs</div>
    <div class="job-list" id="job-list">
        <div class="empty">No jobs yet</div>
    </div>

    <script>
        const socket = io();

        socket.on('dashboard-update', (data) => {
            // Update stats
            document.getElementById('worker-count').textContent = data.workerCount;
            document.getElementById('jobs-running').textContent = data.jobsRunning;
            document.getElementById('jobs-completed').textContent = data.jobsCompleted;
            document.getElementById('tasks-processed').textContent = data.tasksProcessed;

            // Update worker list
            const workerList = document.getElementById('worker-list');
            if (data.workers.length === 0) {
                workerList.innerHTML = '<div class="empty">No workers connected</div>';
            } else {
                workerList.innerHTML = data.workers.map(id => 
                    `<div class="worker-badge">⚡ ${id.substring(0, 8)}...</div>`
                ).join('');
            }

            // Update job list
            const jobList = document.getElementById('job-list');
            if (data.jobs.length === 0) {
                jobList.innerHTML = '<div class="empty">No jobs yet</div>';
            } else {
                jobList.innerHTML = data.jobs.map(job => `
                    <div class="job-item">
                        <span class="job-id">${job.id.substring(0, 16)}...</span>
                        <span>${job.chunks} chunks</span>
                        <span class="badge ${job.status}">${job.status}</span>
                    </div>
                `).join('');
            }
        });
    </script>

</body>
</html>
