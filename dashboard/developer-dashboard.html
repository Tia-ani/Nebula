<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Dashboard - Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060f;
            --surface: #0c0c18;
            --border: #1a1a2e;
            --purple: #6d5aff;
            --green: #00e5a0;
            --yellow: #ffd166;
            --text: #e8e8f4;
            --text-dim: #6a6a88;
            --mono: 'DM Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            padding: 20px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: var(--mono);
            font-size: 1.3rem;
            color: var(--purple);
            letter-spacing: 2px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-name {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .btn-logout {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--purple);
            color: var(--purple);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome {
            margin-bottom: 40px;
        }

        .welcome h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(109,90,255,0.1) 0%, transparent 70%);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(109,90,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--purple);
        }

        .stat-card:nth-child(2) .stat-icon {
            background: rgba(0,229,160,0.1);
        }

        .stat-card:nth-child(2) .stat-icon svg {
            stroke: var(--green);
        }

        .stat-card:nth-child(3) .stat-icon {
            background: rgba(255,215,102,0.1);
        }

        .stat-card:nth-child(3) .stat-icon svg {
            stroke: var(--yellow);
        }

        .stat-card:nth-child(4) .stat-icon {
            background: rgba(106,106,136,0.1);
        }

        .stat-card:nth-child(4) .stat-icon svg {
            stroke: var(--text-dim);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--purple);
            font-family: var(--mono);
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.9rem;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--purple);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--purple);
        }

        .btn-primary {
            padding: 14px 32px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            box-shadow: 0 0 24px rgba(109,90,255,0.3);
        }

        .cost-estimate {
            background: rgba(109,90,255,0.1);
            border: 1px solid var(--purple);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }

        .cost-estimate h4 {
            color: var(--purple);
            margin-bottom: 12px;
        }

        .cost-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .cost-line.total {
            border-top: 1px solid var(--border);
            margin-top: 8px;
            padding-top: 12px;
            font-weight: 600;
            color: var(--text);
            font-size: 1.1rem;
        }

        .job-list {
            margin-top: 24px;
        }

        .job-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-info {
            flex: 1;
        }

        .job-id {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .job-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .job-status.running {
            background: rgba(255,215,102,0.2);
            color: var(--yellow);
        }

        .job-status.completed {
            background: rgba(0,229,160,0.2);
            color: var(--green);
        }

        @media(max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="logo">NEBULA</div>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="welcome">
            <h1>Developer Dashboard</h1>
            <p>Submit AI tasks and track your jobs</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="stat-label">Available Credits</div>
                <div class="stat-value" id="available-credits">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                </div>
                <div class="stat-label">Jobs Submitted</div>
                <div class="stat-value" style="color: var(--green);" id="jobs-submitted">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="stat-label">Active Workers</div>
                <div class="stat-value" style="color: var(--yellow);" id="active-workers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <div class="stat-label">Credits Spent</div>
                <div class="stat-value" style="color: var(--text-dim);" id="credits-spent">0</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Submit New Job</h2>
            
            <form id="job-form">
                <div class="form-group">
                    <label>Tasks (one per line)</label>
                    <textarea id="tasks-input" placeholder="Classify: This product is amazing!&#10;Summarize: AI is transforming...&#10;Translate: Hello world to Spanish" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="priority">
                            <option value="normal">Normal (1x cost)</option>
                            <option value="high">High (1.5x cost)</option>
                            <option value="urgent">Urgent (2x cost)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estimated Completion</label>
                        <input type="text" value="~2-5 minutes" readonly style="color: var(--text-dim);">
                    </div>
                </div>

                <div class="cost-estimate">
                    <h4>Cost Estimate</h4>
                    <div class="cost-line">
                        <span>Tasks:</span>
                        <span id="task-count">0</span>
                    </div>
                    <div class="cost-line">
                        <span>Base cost:</span>
                        <span id="base-cost">0 credits</span>
                    </div>
                    <div class="cost-line">
                        <span>Priority multiplier:</span>
                        <span id="priority-mult">1x</span>
                    </div>
                    <div class="cost-line total">
                        <span>Total:</span>
                        <span id="total-cost">0 credits</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 24px;">Submit Job</button>
            </form>
        </div>

        <div class="section">
            <h2 class="section-title">Recent Jobs</h2>
            <div class="job-list" id="job-list">
                <p style="color: var(--text-dim); text-align: center;">No jobs yet</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('nebula-token');
        const user = JSON.parse(localStorage.getItem('nebula-user') || '{}');

        if (!token || user.role !== 'developer') {
            window.location.href = '/auth';
        }

        document.getElementById('user-name').textContent = user.name;

        // Update cost estimate
        const tasksInput = document.getElementById('tasks-input');
        const prioritySelect = document.getElementById('priority');

        function updateCostEstimate() {
            const tasks = tasksInput.value.split('\n').filter(t => t.trim());
            const taskCount = tasks.length;
            const baseCost = taskCount * 10; // 10 credits per task
            
            const priorityMult = {
                'normal': 1,
                'high': 1.5,
                'urgent': 2
            }[prioritySelect.value];

            const totalCost = Math.ceil(baseCost * priorityMult);

            document.getElementById('task-count').textContent = taskCount;
            document.getElementById('base-cost').textContent = `${baseCost} credits`;
            document.getElementById('priority-mult').textContent = `${priorityMult}x`;
            document.getElementById('total-cost').textContent = `${totalCost} credits`;
        }

        tasksInput.addEventListener('input', updateCostEstimate);
        prioritySelect.addEventListener('change', updateCostEstimate);

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch('/api/developer/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('available-credits').textContent = data.credits || 0;
                    document.getElementById('jobs-submitted').textContent = data.jobsSubmitted || 0;
                    document.getElementById('active-workers').textContent = data.activeWorkers || 0;
                    document.getElementById('credits-spent').textContent = data.creditsSpent || 0;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Submit job
        document.getElementById('job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tasks = tasksInput.value.split('\n').filter(t => t.trim());
            const priority = prioritySelect.value;

            if (tasks.length === 0) {
                alert('Please enter at least one task');
                return;
            }

            try {
                const response = await fetch('/api/developer/submit-job', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ tasks, priority })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Job submitted successfully!');
                    tasksInput.value = '';
                    updateCostEstimate();
                    loadStats();
                } else {
                    alert(data.error || 'Failed to submit job');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });

        function logout() {
            localStorage.removeItem('nebula-token');
            localStorage.removeItem('nebula-user');
            window.location.href = '/auth';
        }

        loadStats();
        updateCostEstimate();
    </script>
</body>
</html>
